<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smurfac4 | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }


        .avatar {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 32px;
        }


        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }


        .link-card {
            display: flex;
            align-items: center;
            justify-content: start;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.06);
            text-decoration: none;
            color: #ffffff;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }


        .link-card i {
            font-size: 20px;
            width: 32px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .link-card:hover {
            background: #ffffff;
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            font-weight: 600;
        }


        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #64748b;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">
            <img src="avatar.jpg" alt="Avans">
        </div>

        <h1>smurfac4</h1>
        <p class="subtitle">Connect with me across platforms</p>

        <div class="links-wrapper">
            
            <a href="https://github.com/smurfac4" class="link-card" target="_blank">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </a>

            <a href="https://www.linkedin.com/in/aleksandr-vanslov-574608288/" class="link-card" target="_blank">
                <i class="fab fa-linkedin-in"></i>
                <span>LinkedIn</span>
            </a>

            <a href="https://steamcommunity.com/profiles/76561198947764302/" class="link-card" target="_blank">
                <i class="fab fa-steam-symbol"></i>
                <span>Steam</span>
            </a>

            <a href="https://t.me/smurfac4" class="link-card" target="_blank">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>

            <a href="https://discord.com/users/vanslov" class="link-card" target="_blank">
                <i class="fab fa-discord"></i>
                <span>Discord</span>
            </a>

            <a href="mailto:aleksvanslov@gmail.com" class="link-card">
                <i class="fas fa-envelope"></i>
                <span>Email Me</span>
            </a>

        </div>

        <div class="footer">
            &copy; 2026 Avans. All rights reserved.
        </div>
    </div>

</body>
</html>
